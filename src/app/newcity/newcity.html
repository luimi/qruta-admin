<div class="bg-white rounded-lg shadow-md p-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Nueva Ciudad</h1>
  <form [formGroup]="cityForm" class="space-y-6">
    <div>
      <label for="cityName" class="block text-sm font-medium text-gray-700 mb-2">
        Nombre de la ciudad
      </label>
      <input 
        id="cityName" 
        type="text" 
        formControlName="name"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
        placeholder="Ingrese el nombre de la ciudad"
      >
      <div *ngIf="name?.invalid && name?.touched" class="mt-2 text-sm text-red-600">
        El nombre de la ciudad es requerido
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Ubicación en el mapa
      </label>
      <div class="text-xs text-gray-500 mb-2">
        Haga clic en el mapa para seleccionar la ubicación
      </div>
      <div #map class="h-96 w-full border border-gray-300 rounded-md"></div>
    </div>

    <div class="flex justify-end">
      <button 
        type="button"
        (click)="onSave()"
        [disabled]="cityForm.invalid"
        class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed"
      >
        Guardar
      </button>
    </div>
  </form>
</div>
