<div class="space-y-6">
  <!-- City Title -->
  <div class="bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-bold text-gray-800">{{ city?.get('name') }}</h1>
  </div>

  <!-- City Configuration -->
  @if(city && isAdmin) {
  <div class="bg-white rounded-lg shadow-md p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Masivo</label>
        <select [(ngModel)]="massive" (change)="massiveChange()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
          <option value=""></option>
          @for(company of companies; track company.id) {
          <option [value]="company.id">{{company.get('name')}}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Estado</label>
        <div class="flex items-center">
          <button type="button" (click)="status()"
            class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            [class.bg-blue-600]="city.get('status')" [class.bg-gray-200]="!city.get('status')">
            <span class="sr-only">Toggle estado</span>
            <span
              class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"
              [class.translate-x-5]="city.get('status')" [class.translate-x-0]="!city.get('status')"></span>
          </button>
          <span class="ml-3 text-sm text-gray-600">
            {{ city.get('status') ? 'Activo' : 'Inactivo' }}
          </span>
        </div>
      </div>
    </div>
  </div>
  }


  <!-- Companies Section -->
  <div class="bg-white rounded-lg shadow-md p-6">
    <h2 class="text-xl font-semibold text-gray-800 mb-4">Empresas</h2>

    <!-- Add Company Form -->
    <div class="mb-6">
      <form [formGroup]="companyForm" class="flex gap-4">
        <input type="text" formControlName="companyName" placeholder="Nombre de la empresa"
          class="flex-1 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        <button type="button" (click)="save()" [disabled]="companyForm.invalid"
          class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed">
          Guardar
        </button>
      </form>
    </div>

    <!-- Companies List -->
    <div class="space-y-2">
      <div *ngIf="companies.length === 0" class="text-gray-500 text-center py-4">
        No hay empresas registradas
      </div>
      @for(company of companies; track company.id) {
      <div
        class="flex items-center justify-between p-3 border border-gray-200 rounded-md">
        <a routerLink="/dashboard/company/{{company.id}}" class="flex flex-1" >
          <span class="text-gray-800 cursor-pointer">{{ company.get('name') }}</span>
        </a>
        @if(isAdmin) {
        <button (click)="deleteCompany(company)" class="text-red-600 hover:text-red-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
            </path>
          </svg>
        </button>
        }
      </div>
      }

    </div>
  </div>
</div>
