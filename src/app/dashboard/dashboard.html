<div class="min-h-screen bg-gray-100 flex">
  <!-- Sidebar -->
  <div class="w-64 bg-white shadow-lg">
    <div class="p-4">
      <!-- Logo -->
      <div class="flex items-center mb-8">
        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
          <img src="/qruta-logo.png">
        </div>
        <span class="ml-3 text-xl font-semibold text-gray-800">Admin</span>
      </div>

      <!-- Nueva Ciudad Button -->
      <div class="mb-6">
        <a routerLink="/dashboard/newcity"
          class="w-full bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors flex items-center justify-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Nueva Ciudad
        </a>
      </div>

      <!-- Menu -->
      <nav class="space-y-2 overflow-scroll max-h-[70vh]">
        <!-- Cities Menu -->
        <div>
          <span class="font-medium">Ciudades</span>
          @for(city of cities; track city.id) {
          <a routerLink="/dashboard/city/{{city.id}}"
            class="block px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded">{{city.get('name')}}</a>
          }
        </div>
      </nav>
    </div>

    <!-- User Section -->
    <div class="absolute bottom-0 w-64 p-4 border-t border-gray-200">
      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">
            <span class="text-sm font-medium text-gray-600">{{current?.get("username")[0].toUpperCase()}}</span>
          </div>
          <span class="ml-3 text-sm font-medium text-gray-700">{{current?.get("username")}}</span>
        </div>
        <button (click)="logout()" class="text-gray-500 hover:text-gray-700 transition-colors" title="Cerrar sesión">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 max-h-[100vh]">
      <div class="container mx-auto px-6 py-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
